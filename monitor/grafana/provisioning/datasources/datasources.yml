# Grafana 数据源自动配置
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: ${POSTGRES_HOST:-10.18.85.10}:${POSTGRES_PORT:-30684}
    database: ${POSTGRES_DB:-aichemol}
    user: ${POSTGRES_USER:-appuser}
    jsonData:
      sslmode: disable
      postgresVersion: 1400
    secureJsonData:
      password: ${POSTGRES_PASSWORD:-strongpassword}
    editable: true
