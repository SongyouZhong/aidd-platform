# =============================================================================
# AIDD Platform 配置文件
# =============================================================================

# -----------------------------------------------------------------------------
# 应用配置
# -----------------------------------------------------------------------------
app:
  name: aidd-platform
  version: 1.0.0
  env: ${APP_ENV:development}
  debug: ${APP_DEBUG:true}

# -----------------------------------------------------------------------------
# 服务器配置
# -----------------------------------------------------------------------------
server:
  host: ${SERVER_HOST:0.0.0.0}
  port: ${SERVER_PORT:8000}
  workers: ${SERVER_WORKERS:4}

# -----------------------------------------------------------------------------
# 数据库配置 (PostgreSQL)
# -----------------------------------------------------------------------------
database:
  host: ${POSTGRES_HOST:10.18.85.10}
  port: ${POSTGRES_PORT:30684}
  user: ${POSTGRES_USER:appuser}
  password: ${POSTGRES_PASSWORD:strongpassword}
  database: ${POSTGRES_DB:aichemol}
  pool_size: ${POSTGRES_POOL_SIZE:10}

# -----------------------------------------------------------------------------
# Redis 配置
# -----------------------------------------------------------------------------
redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  db: ${REDIS_DB:0}
  
  # 队列前缀
  queue_prefix: aidd:tasks
  
  # 结果过期时间（秒）
  result_expire: 86400

# -----------------------------------------------------------------------------
# 调度器配置
# -----------------------------------------------------------------------------
scheduler:
  # 调度间隔（秒）
  dispatch_interval: 1
  
  # 单次调度最大任务数
  max_dispatch_batch: 100
  
  # 任务默认超时（秒）
  default_timeout: 3600
  
  # 最大重试次数
  max_retries: 3
  
  # 重试延迟（秒）
  retry_delay: 60

# -----------------------------------------------------------------------------
# Worker 管理配置
# -----------------------------------------------------------------------------
worker_manager:
  # 心跳超时（秒），超过此时间未收到心跳视为离线
  heartbeat_timeout: 30
  
  # 心跳检查间隔（秒）
  heartbeat_check_interval: 10
  
  # Worker 离线后任务重新调度延迟（秒）
  reschedule_delay: 5

# -----------------------------------------------------------------------------
# 对象存储配置 (MinIO) - 用于文件传输
# -----------------------------------------------------------------------------
storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:172.19.80.100:9090}
    access_key: ${MINIO_ACCESS_KEY:admin}
    secret_key: ${MINIO_SECRET_KEY:minio_test_password_2025}
    secure: false
    bucket: ${MINIO_BUCKET:aidd-files}
  
  local:
    upload_dir: ${FILES_UPLOAD_DIR:/tmp/aidd-uploads}
    temp_dir: ${TEMP_DIR:/tmp/aidd-platform}

# -----------------------------------------------------------------------------
# ADMET 自动同步配置
# 定时扫描 project_compounds 表，自动为缺少 ADMET 结果的分子提交计算任务
# -----------------------------------------------------------------------------
admet_sync:
  # 是否启用自动同步
  enabled: ${ADMET_SYNC_ENABLED:true}

  # 扫描间隔（秒），默认 86400 = 每天一次
  scan_interval: ${ADMET_SYNC_INTERVAL:86400}

  # 每批次提交的 SMILES 数量上限
  batch_size: ${ADMET_SYNC_BATCH_SIZE:50}

  # 任务优先级：4=BATCH（最低），不影响用户手动提交的任务
  task_priority: ${ADMET_SYNC_PRIORITY:4}

# -----------------------------------------------------------------------------
# Docking 自动同步配置
# 定时扫描 project_receptors 表，自动为有受体文件的项目提交 docking 计算任务
# -----------------------------------------------------------------------------
docking_sync:
  # 是否启用自动同步
  enabled: ${DOCKING_SYNC_ENABLED:true}

  # 扫描间隔（秒），默认 3600 = 每小时一次
  scan_interval: ${DOCKING_SYNC_INTERVAL:3600}

  # 每批次提交的 SMILES 数量上限（Glide 计算较慢，使用小批次）
  batch_size: ${DOCKING_SYNC_BATCH_SIZE:10}

  # 任务优先级：3=LOW，低于用户手动提交但高于 ADMET BATCH
  task_priority: ${DOCKING_SYNC_PRIORITY:3}

# -----------------------------------------------------------------------------
# 服务队列映射
# 定义每种计算服务对应的 Redis 队列
# -----------------------------------------------------------------------------
service_queues:
  admet: aidd:tasks:admet
  docking: aidd:tasks:docking
  md: aidd:tasks:md
  qsar: aidd:tasks:qsar
