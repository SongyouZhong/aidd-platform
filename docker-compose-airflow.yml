# =========================================================================
# AIDD Platform — Airflow 迁移版 Docker Compose 配置
# =========================================================================
#
# 所有配置项均从 .env 文件读取，请先确认 .env 已正确配置。
#
# 前置条件:
#   - PostgreSQL: 使用现有数据库（POSTGRES_HOST:POSTGRES_PORT/POSTGRES_DB）
#   - Redis: 使用已有的 aidd-redis 容器（外部管理，已在 aidd-network 上）
#
# 公司内部监控服务（无需本地部署，直接使用）:
#   - Grafana:   http://grafana.createrna.com  /  http://prografana.createrna.com
#   - Kibana:    http://kibana.createrna.com/app/discover  /  http://prokibana.createrna.com
#
# 启动方式:
#   1. 首次启动（初始化 Airflow 元数据库）:
#      docker-compose -f docker-compose-airflow.yml up airflow-init
#   2. 启动所有服务:
#      docker-compose -f docker-compose-airflow.yml up -d
#
# Airflow Web UI: http://localhost:8080
# Prometheus:     http://localhost:${PROMETHEUS_PORT}
#
# =========================================================================

version: "3.8"

# 公共 Airflow 环境变量（所有值均从 .env 文件读取）
x-airflow-env: &airflow-env
  # Airflow 核心配置
  AIRFLOW__CORE__EXECUTOR: CeleryExecutor
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DEFAULT_TIMEZONE: ${AIRFLOW_TIMEZONE}
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
  # 容器 locale 设置
  PYTHONIOENCODING: "utf-8"
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  # Airflow 元数据库
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/airflow
  # Celery Broker 使用 Redis db1（业务数据在 db0，避免冲突）
  AIRFLOW__CELERY__BROKER_URL: redis://${REDIS_HOST}:${REDIS_PORT}/${REDIS_BROKER_DB}
  AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/airflow
  # API Server (Airflow 3.x: webserver 已改为 api-server)
  AIRFLOW__API__WORKERS: ${AIRFLOW_WEBSERVER_WORKERS}
  # SimpleAuthManager 认证（Airflow 3.x 替代 airflow users create）
  AIRFLOW__SIMPLE_AUTH_MANAGER__ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
  AIRFLOW__SIMPLE_AUTH_MANAGER__ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
  # Scheduler 性能
  AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC: ${AIRFLOW_SCHEDULER_HEARTBEAT_SEC}
  AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: ${AIRFLOW_SCHEDULER_MIN_FILE_PROCESS_INTERVAL}
  # 日志
  AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
  # 业务连接参数（供 DAG 中的 common/config.py 读取）
  POSTGRES_HOST: ${POSTGRES_HOST}
  POSTGRES_PORT: ${POSTGRES_PORT}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}
  REDIS_HOST: ${REDIS_HOST}
  REDIS_PORT: ${REDIS_PORT}
  REDIS_DB: ${REDIS_DB}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_BUCKET: ${MINIO_BUCKET}
  # SimpleAuthManager：指定自定义密码文件，密码在 config/airflow-passwords.json 中配置
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/config/airflow-passwords.json

# 公共 Airflow 卷挂载
x-airflow-volumes: &airflow-volumes
  - ./dags:/opt/airflow/dags
  - airflow_logs:/opt/airflow/logs
  - ./config/airflow-passwords.json:/opt/airflow/config/airflow-passwords.json

services:
  # =========================================================================
  # Airflow 初始化（仅首次运行）
  # =========================================================================
  airflow-init:
    image: apache/airflow:3.1.7-python3.11
    container_name: aidd-airflow-init
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
    networks:
      - aidd-network

  # =========================================================================
  # Airflow API Server（Airflow 3.x: webserver 已重命名为 api-server）
  # =========================================================================
  airflow-webserver:
    image: apache/airflow:3.1.7-python3.11
    container_name: aidd-airflow-webserver
    command: api-server
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    ports:
      - "8080:8080"
    networks:
      - aidd-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # =========================================================================
  # Airflow Scheduler（DAG 解析和调度）
  # =========================================================================
  airflow-scheduler:
    image: apache/airflow:3.1.7-python3.11
    container_name: aidd-airflow-scheduler
    command: scheduler
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    networks:
      - aidd-network
    restart: unless-stopped

  # =========================================================================
  # Airflow DAG Processor（Airflow 3.x: DAG 解析器从 Scheduler 拆分为独立服务）
  # =========================================================================
  airflow-dag-processor:
    image: apache/airflow:3.1.7-python3.11
    container_name: aidd-airflow-dag-processor
    command: dag-processor
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    networks:
      - aidd-network
    restart: unless-stopped

  # =========================================================================
  # Airflow Celery Worker（仅做编排，不做计算——计算由 aidd-toolkit Worker 执行）
  # =========================================================================
  airflow-worker:
    image: apache/airflow:3.1.7-python3.11
    container_name: aidd-airflow-worker
    command: celery worker
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    networks:
      - aidd-network
    restart: unless-stopped

  # =========================================================================
  # Prometheus（本地指标采集，供公司 Grafana 抓取）
  # 公司 Grafana 需手动添加本机 Prometheus 为 datasource:
  #   http://grafana.createrna.com  →  Configuration → Data Sources → Add → Prometheus
  #   URL: http://<本机IP>:${PROMETHEUS_PORT}
  # =========================================================================
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: aidd-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./monitor/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    networks:
      - aidd-network
    restart: unless-stopped

  # =========================================================================
  # Fluentd（日志采集 → 公司 Elasticsearch → 公司 Kibana）
  # Kibana:    http://kibana.createrna.com/app/discover
  # 备用 Kibana: http://prokibana.createrna.com
  # =========================================================================
  fluentd:
    image: ${FLUENTD_IMAGE}
    container_name: aidd-fluentd
    user: root
    volumes:
      - ./monitor/fluent.conf:/fluentd/etc/fluent.conf:ro
      - airflow_logs:/var/log/airflow:ro
    environment:
      - FLUENT_ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - FLUENT_ELASTICSEARCH_PORT=${ELASTICSEARCH_PORT}
      - FLUENT_ELASTICSEARCH_USER=${ELASTICSEARCH_USERNAME}
      - FLUENT_ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - FLUENT_ELASTICSEARCH_INDEX_NAME=${ELASTICSEARCH_INDEX}
    networks:
      - aidd-network
    restart: unless-stopped

# =========================================================================
# 网络
# =========================================================================
networks:
  aidd-network:
    external: true
    name: aidd-network

# =========================================================================
# 数据卷
# =========================================================================
volumes:
  airflow_logs:
    name: aidd-airflow-logs
  prometheus_data:
    name: aidd-prometheus-data
